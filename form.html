<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lead Input Form</title>
  <link rel="stylesheet" href="form.css" />
</head>
<body>
  <h1>Enter Lead Information</h1>

  <form id="lead-form">
    <label>Lead ID<input type="number" name="lead_id" /></label>
    <label>Lead Date<input type="date" name="lead_date" required /></label>
    <label>Property Type<input type="text" name="property_type" required /></label>
    <label>Neighbourhood<input type="text" name="neighbourhood" required /></label>
    <label>Estimated Job Size (sqft)<input type="number" name="estimated_job_size_sqft" required /></label>
    <label>Requested Timeline<input type="text" name="requested_timeline" required /></label>
    <label>Referral Source<input type="text" name="referral_source" required /></label>
    <label>Homeowner Status<input type="text" name="homeowner_status" required /></label>
    <label>Preferred Contact<input type="text" name="preferred_contact" required /></label>
    <label>Lead Capture Weather<input type="text" name="lead_capture_weather" required /></label>
    <label>Distance to Queens (km)<input type="number" step="0.01" name="distance_to_queens_km" required /></label>
    <label>Customer Age Bracket<input type="text" name="customer_age_bracket" required /></label>
    <label>Has Pets
      <select name="has_pets" required>
        <option value="true">Yes</option>
        <option value="false">No</option>
      </select>
    </label>
    <label>Lead Weekday<input type="text" name="lead_weekday" required /></label>
    <label>Expected Profit Band<input type="text" name="expected_profit_band" required /></label>

    <button type="submit">Submit</button>
  </form>

  <script src="formHandler.js"></script>
</body>
</html>
